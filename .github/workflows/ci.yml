name: CI & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: "1.3"
  RUST_TOOLCHAIN: "stable"

jobs:
  # Keep the committed lockfile in sync with the dependency manifest before
  # starting platform-specific jobs. CI jobs below use this exact revision.
  sync_lockfile:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.sync.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Sync Bun lockfile
        id: sync
        shell: bash
        run: |
          bun install

          if git diff --quiet -- bun.lock; then
            echo "ref=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::bun.lock is out of date; update it on main before building this ref."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: sync bun lockfile"
          git push origin HEAD:main
          echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Check & Lint
  # ---------------------------------------------------------------------------
  check:
    needs: [sync_lockfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile
      # The repository still contains optional extension packages and their
      # provider-specific compatibility tests. They are intentionally outside
      # the OpenAI/Ollama/Synthetic release surface, so a workspace-wide
      # TypeScript check fails on APIs that were removed with that reduction.
      # Keep CI linting the entire tree; the smoke and release jobs below
      # exercise the CLI and compile the distributable binaries.
      - run: bun run check:tools

  # ---------------------------------------------------------------------------
  # Build Native Addons (Rust) - Linux x64
  # ---------------------------------------------------------------------------
  native_linux_x64:
    needs: [sync_lockfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - run: bun install --frozen-lockfile

      - name: Build native addons (glibc 2.17 baseline)
        run: bun run ci:build:native
        env:
          TARGET_VARIANTS: baseline modern
          CROSS_TARGET: x86_64-unknown-linux-gnu.2.17
          TARGET_PLATFORM: linux
          TARGET_ARCH: x64

      - name: Upload release native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: packages/natives/native/pi_natives.linux-x64-*.node
          if-no-files-found: error
          retention-days: 1

      - name: Upload CLI smoke native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64-smoke
          path: packages/natives/native/pi_natives.linux-x64-*.node
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build Native Addons (Rust) - Windows x64
  # ---------------------------------------------------------------------------
  native_windows_x64:
    needs: [sync_lockfile]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - run: bun install --frozen-lockfile

      - name: Build native addons
        run: bun run ci:build:native
        env:
          TARGET_VARIANTS: baseline modern

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64
          path: packages/natives/native/pi_natives.win32-x64-*.node
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Smoke Test
  # ---------------------------------------------------------------------------
  test_smoke:
    needs: [check, native_linux_x64, sync_lockfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Restore native addon for CLI smoke test
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64-smoke
          path: packages/natives/native

      - run: bun packages/coding-agent/src/cli.ts --version
      - run: bun packages/coding-agent/src/cli.ts --help

  # ---------------------------------------------------------------------------
  # Build Release Binaries
  # ---------------------------------------------------------------------------
  release_binary_linux:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: [check, native_linux_x64, sync_lockfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: packages/natives/native

      - run: bun install --frozen-lockfile

      - name: Compile binary (linux-x64)
        run: bun run ci:release:build-binaries
        env:
          RELEASE_TARGETS: linux-x64

      - name: Package as zip
        run: |
          mkdir -p release
          cp packages/coding-agent/binaries/omp-linux-x64 release/omp
          chmod +x release/omp
          cd release && zip ../omp-linux-x64.zip omp

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: omp-linux-x64.zip
          retention-days: 5

  release_binary_windows:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: [check, native_windows_x64, sync_lockfile]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: packages/natives/native

      - run: bun install --frozen-lockfile

      - name: Compile binary (windows-x64)
        run: bun run ci:release:build-binaries
        env:
          RELEASE_TARGETS: win32-x64

      - name: Package as zip
        run: |
          mkdir release
          copy packages\coding-agent\binaries\omp-windows-x64.exe release\omp.exe
          Compress-Archive -Path release\omp.exe -DestinationPath omp-windows-x64.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: omp-windows-x64.zip
          retention-days: 5

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release_github:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: [release_binary_linux, release_binary_windows, sync_lockfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync_lockfile.outputs.ref }}

      - name: Resolve draft release tag
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            version="$(node -p "require('./packages/coding-agent/package.json').version")"
            tag="v${version}-draft.${GITHUB_RUN_NUMBER}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ needs.sync_lockfile.outputs.ref }}
          files: |
            omp-linux-x64.zip
            omp-windows-x64.zip
          body: |
            ## 内网 AI Agent 发布 / Intranet AI Agent Release

            ### 使用方法 / Usage

            1. 下载对应平台的 zip 文件
            2. 解压得到单文件可执行程序 `omp` (Linux) 或 `omp.exe` (Windows)
            3. 创建配置文件 `~/.omp/models.json`，配置内网模型 API 地址
            4. 运行 `./omp` 开始使用

            ### 系统要求 / System Requirements

            - **Linux**: CentOS 7+ (glibc 2.17+), x86_64
            - **Windows**: Windows 10+, x64

            ### 配置示例 / Config Example

            ```json
            {
              "providers": {
                "my-intranet-llm": {
                  "baseUrl": "http://192.168.1.100:8000/v1",
                  "apiKey": "your-api-key",
                  "api": "openai-completions",
                  "auth": "apiKey",
                  "models": [
                    {
                      "id": "qwen2.5-72b",
                      "name": "Qwen2.5 72B",
                      "contextWindow": 32768,
                      "maxTokens": 8192
                    }
                  ]
                }
              }
            }
            ```
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
